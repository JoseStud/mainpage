services:
  mainpage:
    image: ghcr.io/josestud/mainpage:fec8b7bbd8092625cdc2c12a02ab7eb19fa51d53
    container_name: mainpage
    restart: unless-stopped
    pull_policy: always
    environment:
      - MULTI_SCROBBLER_BASE_URL=http://multi-scrobbler:9078
    ports:
      - "8000:80"
    depends_on:
      - multi-scrobbler

  multi-scrobbler:
    image: ghcr.io/josestud/mainpage:fec8b7bbd8092625cdc2c12a02ab7eb19fa51d53
    container_name: multi-scrobbler
    restart: unless-stopped
    ports:
      - "9078:9078"
    volumes:
      - multi_scrobbler_config:/config

volumes:
  multi_scrobbler_config:
