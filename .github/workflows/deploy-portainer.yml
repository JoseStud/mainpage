name: Build and Deploy (Portainer GitOps)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  STACK_FILE: deploy/portainer-stack.yml

jobs:
  build-and-update-stack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image coordinates
        run: |
          IMAGE_REPO="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPO }}:main

      - name: Update Portainer stack image tag
        run: |
          sed -i -E "s|^\\s*image:\\s.*$|    image: ${IMAGE_REPO}:${IMAGE_TAG}|" "${STACK_FILE}"

      - name: Commit stack update
        run: |
          if git diff --quiet -- "${STACK_FILE}"; then
            echo "No stack change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${STACK_FILE}"
          git commit -m "chore(deploy): bump Portainer image to ${IMAGE_TAG}"
          git push
